<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RiskPlus — Decisão de crédito B2B em segundos.</title>
  <meta name="description" content="Analise o CNPJ do seu cliente B2B e descubra em segundos se vale dar o prazo — mesmo para quem não aparece nos bureaus tradicionais. Sem planilha. Sem achismo." />

  <link rel="icon" href="assets/icon-blue.svg" />
  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/site.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="components/Header.jsx"></script>
  <script type="text/babel" src="components/Hero.jsx"></script>
  <script type="text/babel" src="components/Logos.jsx"></script>
  <script type="text/babel" src="components/Differentiators.jsx"></script>
  <script type="text/babel" src="components/FeatureGrid.jsx"></script>
  <script type="text/babel" src="components/ProductPreview.jsx"></script>
  <script type="text/babel" src="components/RiskBands.jsx"></script>
  <script type="text/babel" src="components/Stats.jsx"></script>
  <script type="text/babel" src="components/Testimonial.jsx"></script>
  <script type="text/babel" src="components/Pricing.jsx"></script>
  <script type="text/babel" src="components/FAQ.jsx"></script>
  <script type="text/babel" src="components/CTA.jsx"></script>
  <script type="text/babel" src="components/Footer.jsx"></script>

  <script type="text/babel">
    const App = () => {
      // Re-run lucide whenever anything that adds icons mounts/updates
      React.useEffect(() => {
        const renderIcons = () => window.lucide && window.lucide.createIcons();
        renderIcons();
        const tids = [
          setTimeout(renderIcons, 250),
          setTimeout(renderIcons, 800),
          setTimeout(renderIcons, 1800),
        ];
        return () => tids.forEach(clearTimeout);
      }, []);

      return (
        <>
          <Header />
          <Hero />
          <Logos />
          <Differentiators />
          <FeatureGrid />
          <ProductPreview />
          <RiskBands />
          <Stats />
          <Testimonial />
          <Pricing />
          <FAQ />
          <CTA />
          <Footer />
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
